name: CI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Replace toc-versions
        uses: Numynum/ToCVersions@master

      - name: Create Package
        uses: BigWigsMods/packager@v2
        with:
          args: -S
        env:
          GITHUB_OAUTH: ${{ secrets.WORKFLOW_OAUTH }}
